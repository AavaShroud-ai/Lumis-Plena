# Simulation Configuration

# Simulation Parameters
simulation:
  duration: 500  # Number of simulation steps
  half_space_size: 50  # Half of grid size (agents can move in range -50 to +50) — doubled for run 013 to test whether NE drift is intrinsic or a boundary-clamp artifact
  half_place_size: 5   # Half of place size (place covers -5 to +5)
  
# Agent Parameters
agents:
  num_agents: 14
  num_large: 4        # Large Lumis: 2 per base (base_alpha: L0+L2, base_beta: L1+L3)
  num_small: 10       # Small Lumis (observation and exploration)
  # Note: reduced from 20 to 12 (run 008), now 14 with 4 large (run 009+)
  # Large increased to 4 to solve L1 loneliness problem (structural asymmetry)
  communication_radius: 5  # Radius for agent communication
  memory_limit: 20  # Maximum number of memory entries to store
  memory_size: 5  # Number of recent memory entries used in LLM prompt
  message_history_limit: 10  # Maximum number of received messages to store
  message_context_size: 3  # Number of recent messages used in LLM prompt
  
# Place Parameters (multiple places)
# Each place must have a type: "bar", "cafe", "library", etc.
# type is a required field
places:
  - name: "base_alpha"
    type: "lunar_base"
    center_x: -20
    center_y: 20
    half_size: 5
    capacity: 20
  - name: "base_beta"
    type: "lunar_base"
    center_x: 20
    center_y: -20
    half_size: 5
    capacity: 20
  
# LLM Parameters
llm:
  #model: "qwen3:4b-instruct-2507-q4_K_M"
  model: "llama3.2:latest"  # Ollama model name
  base_url: "http://localhost:11434"  # Ollama API endpoint
  temperature: 0.2
  max_tokens: 2048  # Thinking models need more tokens (thinking + response)
  # Anti-repetition parameters
  repeat_penalty: 1.1  # Repeat penalty (1.0-1.2 range, adjust for fine-tuning)
  repeat_last_n: 128  # Range to check for repetition (longer = stronger against loops)
  min_p: 0.05  # Min-P (cuts noise while preserving intelligence)
  
# Lunar Day/Night Cycle Parameters
# 30-step cycle (15 steps day + 15 steps night)
day_night_cycle:
  period: 30      # Total cycle length (day + night)
  night_length: 15  # Number of steps that are night within each cycle
  intensity: 0.9
  radius: 50

# Solar Flare Events — generated at simulation start from real-world statistics,
# not a fixed list. Two properties of actual solar flares are modeled:
# (1) intervals between flares follow a log-normal distribution (per Chandrayaan-2
#     XSM catalogue analysis of real lunar-orbit flare observations) rather than
#     being evenly spaced — real flare timing clusters and has long quiet gaps;
# (2) larger, more damaging flares are rarer than small ones (real X-class flares
#     occur ~8 times per 11-year solar cycle vs. ~2000 M-class flares — severity
#     and frequency are inversely related).
# warning_steps: how many steps before the flare to emit electromagnetic noise warning
solar_flares:
  generate: true              # if true, ignore any fixed list below and generate at runtime
  seed: null                  # set an integer for reproducible flare sequences; null = random each run
  interval_median_steps: 50   # log-normal median gap between flare starts
  interval_sigma: 0.7         # log-normal shape parameter (higher = more clustering/burstiness)
  min_interval_steps: 15      # hard floor so flares can't overlap or start back-to-back
  damage_min: 0.08            # smallest possible flare damage
  damage_max: 0.35            # largest possible flare damage (rare)
  damage_shape: 2.5           # power-law-like shape: higher = large flares rarer (severity/frequency inversely related, as in real flare statistics)
  duration_min: 3
  duration_max: 8
  warning_steps: 2

# Visualization Parameters
visualization:
  save_frames: true
  frame_interval: 1  # Save frame every N steps
  output_dir: "output"
  
# Logging
logging:
  level: "INFO"
  log_file: "simulation.log"


